<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Kiosk – DTR</title>
  <!-- QR scanner library is loaded only when Scan QR Code is tapped for faster kiosk startup. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#090014;
      --void:#090014;
      --card:rgba(26,16,60,.86);
      --card-strong:rgba(8,2,24,.92);
      --text:#E0E0E0;
      --muted:rgba(224,224,224,.68);
      --magenta:#FF00FF;
      --cyan:#00FFFF;
      --orange:#FF9900;
      --border:#2D1B4E;
      --soft:rgba(0,255,255,.08);
      --shadow:0 0 30px rgba(0,255,255,.18), 0 0 60px rgba(255,0,255,.12);
      --radius:0;
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    html,body{min-height:100%;}

    body{
      font-family:"Share Tech Mono", monospace;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,0,255,.22), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(0,255,255,.16), transparent 26%),
        linear-gradient(180deg,#090014 0%,#120024 52%,#05000d 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
      position:relative;
    }

    .vapor-bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .vapor-bg::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle, rgba(255,0,255,.42) 1px, transparent 1.5px);
      background-size:26px 26px;
      opacity:.18;
      mask-image:linear-gradient(to bottom, transparent 0%, black 22%, transparent 78%);
    }

    .sun{
      position:absolute;
      width:520px;
      height:520px;
      border-radius:50%;
      left:50%;
      top:8%;
      transform:translateX(-50%);
      background:linear-gradient(to bottom,var(--orange),var(--magenta));
      filter:blur(92px);
      opacity:.22;
      animation:sunPulse 5s linear infinite alternate;
    }

    .grid-floor{
      position:absolute;
      left:-30%;
      right:-30%;
      bottom:-22%;
      height:54%;
      background-image:
        linear-gradient(transparent 94%, rgba(255,0,255,.85) 95%),
        linear-gradient(90deg, transparent 94%, rgba(0,255,255,.7) 95%);
      background-size:44px 44px;
      transform:perspective(520px) rotateX(62deg) translateY(10px) scale(1.25);
      transform-origin:top center;
      opacity:.32;
      mask-image:linear-gradient(to bottom, transparent, black 22%, transparent 92%);
    }

    .scanlines{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:50;
      background:
        linear-gradient(rgba(18,16,20,0) 50%, rgba(0,0,0,.28) 50%),
        linear-gradient(90deg, rgba(255,0,0,.045), rgba(0,255,0,.012), rgba(0,0,255,.045));
      background-size:100% 4px, 100% 100%;
      mix-blend-mode:screen;
      opacity:.35;
    }

    .wrap{
      width:100%;
      max-width:480px;
      position:relative;
      z-index:2;
    }

    .header{
      text-align:center;
      margin-bottom:18px;
      position:relative;
    }

    .header::before{
      content:"> SYSTEM ONLINE";
      display:inline-block;
      color:var(--cyan);
      font-size:11px;
      letter-spacing:3px;
      text-shadow:0 0 10px var(--cyan);
      margin-bottom:8px;
    }

    .header h1{
      font-family:"Orbitron", sans-serif;
      font-size:26px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      background:linear-gradient(to right,var(--orange),var(--magenta),var(--cyan));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      filter:drop-shadow(0 0 18px rgba(255,0,255,.65));
    }

    .header p{
      color:var(--muted);
      font-size:12px;
      margin-top:7px;
      text-transform:uppercase;
      letter-spacing:1.5px;
    }

    .clock{
      text-align:center;
      font-family:"Orbitron", sans-serif;
      font-size:44px;
      font-weight:900;
      letter-spacing:4px;
      color:#fff;
      text-shadow:
        0 0 8px rgba(255,255,255,.65),
        0 0 24px rgba(0,255,255,.55),
        0 0 44px rgba(255,0,255,.36);
    }

    .date-disp{
      text-align:center;
      color:var(--cyan);
      font-size:12px;
      margin:5px 0 18px;
      text-transform:uppercase;
      letter-spacing:1.4px;
      text-shadow:0 0 10px rgba(0,255,255,.5);
    }

    .card{
      position:relative;
      background:var(--card);
      border:1px solid rgba(255,0,255,.38);
      border-top:2px solid var(--cyan);
      border-radius:0;
      box-shadow:var(--shadow);
      padding:20px;
      margin-bottom:14px;
      backdrop-filter:blur(14px);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-left:1px solid rgba(0,255,255,.25);
      border-right:1px solid rgba(255,0,255,.25);
    }

    .card h3{
      font-family:"Orbitron", sans-serif;
      font-size:14px;
      margin-bottom:7px;
      color:var(--cyan);
      text-transform:uppercase;
      letter-spacing:1px;
      text-shadow:0 0 8px rgba(0,255,255,.72);
    }

    .desc{
      color:var(--muted);
      font-size:12px;
      margin-bottom:12px;
      line-height:1.45;
    }

    input{
      width:100%;
      padding:14px 12px;
      border-radius:0;
      border:0;
      border-bottom:2px solid var(--magenta);
      font-family:"Share Tech Mono", monospace;
      font-size:24px;
      font-weight:400;
      letter-spacing:4px;
      text-align:center;
      outline:none;
      background:rgba(0,0,0,.72);
      color:var(--cyan);
      text-shadow:0 0 8px rgba(0,255,255,.8);
      box-shadow:inset 0 0 18px rgba(255,0,255,.12);
      transition:all .18s linear;
    }

    input::placeholder{
      color:rgba(255,0,255,.42);
      font-size:14px;
      letter-spacing:1px;
      text-shadow:none;
    }

    input:focus{
      border-bottom-color:var(--cyan);
      background:#03000a;
      box-shadow:0 0 16px rgba(0,255,255,.55), inset 0 0 22px rgba(0,255,255,.08);
    }

    .btn{
      width:100%;
      padding:13px;
      border-radius:0;
      border:2px solid var(--cyan);
      background:transparent;
      color:var(--cyan);
      font-family:"Share Tech Mono", monospace;
      font-size:13px;
      font-weight:700;
      letter-spacing:1.5px;
      text-transform:uppercase;
      cursor:pointer;
      margin-top:10px;
      transform:skewX(-8deg);
      transition:all .18s linear;
      box-shadow:0 0 12px rgba(0,255,255,.18);
    }

    .btn:hover{
      background:var(--cyan);
      color:#000;
      transform:skewX(0deg) scale(1.02);
      box-shadow:0 0 24px var(--cyan),0 0 44px rgba(0,255,255,.35);
    }

    .btn.sec{
      background:rgba(255,0,255,.08);
      color:var(--magenta);
      border-color:var(--magenta);
      box-shadow:0 0 12px rgba(255,0,255,.18);
    }

    .btn.sec:hover{
      background:var(--magenta);
      color:#fff;
      box-shadow:0 0 24px var(--magenta),0 0 44px rgba(255,0,255,.35);
    }

    .emp-card{
      background:rgba(0,0,0,.48);
      border:1px solid rgba(0,255,255,.35);
      border-left:3px solid var(--magenta);
      border-radius:0;
      padding:15px;
      text-align:center;
      margin-bottom:14px;
      box-shadow:inset 0 0 20px rgba(0,255,255,.07);
    }

    .emp-name{
      font-family:"Orbitron", sans-serif;
      font-size:22px;
      font-weight:800;
      color:#fff;
      text-transform:uppercase;
      text-shadow:0 0 12px rgba(255,0,255,.7);
    }

    .emp-meta{
      color:var(--cyan);
      font-size:12px;
      margin-top:6px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .abtn{
      min-height:58px;
      padding:14px 10px;
      border-radius:0;
      border:2px solid rgba(255,0,255,.78);
      background:linear-gradient(135deg,rgba(255,0,255,.18),rgba(0,255,255,.08));
      color:#fff;
      font-family:"Share Tech Mono", monospace;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      cursor:pointer;
      transition:all .16s linear;
      box-shadow:0 0 14px rgba(255,0,255,.2);
      position:relative;
      overflow:hidden;
    }

    .abtn::before{
      content:"";
      position:absolute;
      left:-80%;
      top:0;
      width:60%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
      transform:skewX(-18deg);
      transition:left .28s linear;
    }

    .abtn:hover{
      border-color:var(--cyan);
      color:#000;
      background:var(--cyan);
      transform:translateY(-2px);
      box-shadow:0 0 22px var(--cyan),0 0 40px rgba(0,255,255,.32);
    }

    .abtn:hover::before{left:120%;}

    .abtn:active{transform:scale(.97);}

    .abtn:disabled,
    .abtn.locked{
      opacity:.38 !important;
      cursor:not-allowed !important;
      pointer-events:none;
      filter:grayscale(.35);
      border-color:rgba(224,224,224,.24) !important;
      color:rgba(224,224,224,.65) !important;
      background:rgba(0,0,0,.42) !important;
      box-shadow:none !important;
      transform:none !important;
    }

    .note{
      text-align:center;
      color:var(--muted);
      font-size:11px;
      margin-top:12px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .toast{
      padding:13px 16px;
      border-radius:0;
      font-size:13px;
      text-align:center;
      display:none;
      margin-top:0;
      border:1px solid rgba(224,224,224,.18);
      background:var(--card-strong);
      box-shadow:0 0 18px rgba(255,0,255,.18);
      text-transform:uppercase;
      letter-spacing:.8px;
      line-height:1.35;
    }

    .toast.show{display:block;}
    .toast.ok{border-color:#00ff88;color:#00ff88;box-shadow:0 0 18px rgba(0,255,136,.22);}
    .toast.err{border-color:#ff3b6b;color:#ff6a8b;box-shadow:0 0 18px rgba(255,0,80,.22);}
    .toast.warn{border-color:var(--orange);color:#ffd166;box-shadow:0 0 18px rgba(255,153,0,.22);}

    .hidden{display:none!important;}
    .hidden-action{display:none!important;}

    #reader{
      border-radius:0;
      overflow:hidden;
      margin-top:12px;
      border:2px solid var(--cyan);
      box-shadow:0 0 18px rgba(0,255,255,.3);
      background:#000;
    }

    .spin{
      display:inline-block;
      animation:spin 1s linear infinite;
      color:var(--cyan);
      text-shadow:0 0 10px var(--cyan);
    }

    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes sunPulse{from{opacity:.16;transform:translateX(-50%) scale(.96);}to{opacity:.3;transform:translateX(-50%) scale(1.05);}}

    @media (max-width:520px){
      body{padding:14px;}
      .wrap{max-width:100%;}
      .clock{font-size:36px;letter-spacing:3px;}
      .header h1{font-size:22px;}
      .card{padding:16px;}
      .grid2{gap:8px;}
      .abtn{font-size:12px;min-height:54px;padding:12px 8px;}
    }
  </style>
  <link rel="icon" type="image/png" href="clock.png">
</head>
<body>
<div class="vapor-bg"><div class="sun"></div><div class="grid-floor"></div></div>
<div class="scanlines"></div>
<div class="wrap">
  <div class="header"><h1>KS Internal DTR Kiosk</h1><p>Daily Time Record System</p></div>
  <div class="clock" id="clk">--:--:--</div>
  <div class="date-disp" id="dte"></div>

  <div class="card" id="loadCard">
    <p style="text-align:center;color:var(--muted)"><span class="spin">⏳</span> Loading employees from server...</p>
  </div>

  <div class="card hidden" id="inputCard">
    <h3>Enter Employee Code</h3>
    <p class="desc">Type your employee code or scan your QR badge.</p>
    <input id="empIn" placeholder="e.g. 409" maxlength="20" autocomplete="off" autocapitalize="characters"/>
    <button class="btn" id="scanBtn">📷 Scan QR Code</button>
    <div id="reader" class="hidden"></div>
    <button class="btn sec hidden" id="closeBtn">✕ Close Scanner</button>
  </div>

  <div class="card hidden" id="actCard">
    <div class="emp-card">
      <div class="emp-name" id="eName"></div>
      <div class="emp-meta" id="eMeta"></div>
    </div>
    <div class="grid2">
     
      <button class="abtn" data-a="breakStart">☕ Break Start</button>
      <button class="abtn" data-a="shortBreakStart">⏱️ Short Break Start</button>
      <button class="abtn" data-a="breakEnd">🔄 Break End</button>
      <button class="abtn" data-a="shortBreakEnd">▶️ Short Break End</button>

    </div>
     <p class="note"></p>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  // ── YOUR APPS SCRIPT URL ─────────────────────────────────────────────────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMzFmREpMCZ2m9t1k0Aip4cBVswPDJe_80sUw4MioHSUSnQpp8LOLzfsM-fPkxLf4Qww/exec";
  // ─────────────────────────────────────────────────────────────────────────

  let employees = [];
  let currentEmp = null;
  let scanner = null;
  let isSending = false;
  let todayRecords = {};
  const QUICK_RESET_MS = 350;

  // Clock
  function tick() {
    const n = new Date();
    document.getElementById("clk").textContent =
      n.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
    document.getElementById("dte").textContent =
      n.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  }
  tick(); setInterval(tick,1000);

  const fmt  = (d=new Date()) => d.toLocaleDateString("en-CA");
  const fmtT = (d=new Date()) =>
    d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});

  const EMP_CACHE_KEY = "kioskdtr_employee_cache_v3";

  function applyEmployeeData(data) {
    employees = data.employees || [];
    todayRecords = {};
    (data.todayRecords || []).forEach(function(rec) {
      todayRecords[String(rec.code).toUpperCase()] = rec;
    });

    const currentCode = document.getElementById("empIn")?.value.trim().toUpperCase();
    if (currentCode) {
      document.getElementById("empIn").dispatchEvent(new Event("input"));
    }
  }

  function saveEmployeeCache(data) {
    try {
      localStorage.setItem(EMP_CACHE_KEY, JSON.stringify({
        date: fmt(),
        savedAt: Date.now(),
        employees: data.employees || [],
        todayRecords: data.todayRecords || []
      }));
    } catch (_) {}
  }

  function loadEmployeeCache() {
    try {
      const raw = localStorage.getItem(EMP_CACHE_KEY);
      if (!raw) return false;
      const cached = JSON.parse(raw);
      if (!cached || cached.date !== fmt()) return false;
      applyEmployeeData(cached);
      return employees.length > 0;
    } catch (_) {
      return false;
    }
  }

  // ── Load employees from Google Sheets ─────────────────────────────────────
  async function loadEmps(silent) {
    // Only skip if URL is literally the placeholder text
    if (!SCRIPT_URL || SCRIPT_URL.trim() === "YOUR_APPS_SCRIPT_URL_HERE") {
      toast("⚠ Script URL not configured","err");
      show("loadCard",false); show("inputCard",true);
      return;
    }

    // Fast start: show the kiosk immediately using local cache, then sync fresh data in the background.
    if (!silent) {
      const hasCache = loadEmployeeCache();
      show("loadCard",false);
      show("inputCard",true);
      document.getElementById("empIn").focus();

      if (hasCache) {
        toast("✓ Employees ready. Syncing latest records...", "ok");
        setTimeout(hideToast, 900);
      } else {
        toast("Syncing employees...", "warn");
      }
    }

    try {
      const today = fmt();
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      const r = await fetch(SCRIPT_URL + "?action=getEmployees&date=" + today + "&_=" + Date.now(), {
        cache: "no-store",
        signal: controller.signal
      });
      clearTimeout(timer);
      const d = await r.json();

      applyEmployeeData(d);
      saveEmployeeCache(d);

      if (employees.length === 0) {
        if (!silent) toast("No employees found. Add from Admin Panel first.","err");
      } else {
        if (!silent) {
          toast("✓ " + employees.length + " employee(s) loaded", "ok");
          setTimeout(hideToast, 900);
        }
      }
    } catch(e) {
      if (!silent && employees.length === 0) {
        if (e.name === "AbortError") {
          toast("⏱ Server is slow. Try refreshing.","err");
        } else {
          toast("⚠ Error: " + e.message,"err");
        }
      } else {
        console.warn("Employee sync failed:", e);
      }
    }
  }
  loadEmps(false);

  // ── Live employee lookup ──────────────────────────────────────────────────
  document.getElementById("empIn").addEventListener("input", function(e) {
    const code = e.target.value.trim().toUpperCase();
    const emp = employees.find(function(x){ return String(x.code).toUpperCase() === code; });
    if (emp) showEmp(emp); else hideEmp();
  });

  function isDepartureRecorded(rec) {
    if (!rec) return false;
    return !!String(rec.departure || "").trim() ||
      String(rec.lastAction || "").trim().toLowerCase() === "departure";
  }

  function hasValue(value) {
    return String(value || "").trim() !== "";
  }

  function setVisibleActions(visibleKeys) {
    const visible = new Set(visibleKeys || []);
    document.querySelectorAll(".abtn").forEach(function(btn) {
      const isVisible = visible.has(btn.dataset.a);
      btn.classList.toggle("hidden-action", !isVisible);
      if (!isVisible) btn.disabled = true;
    });
  }

  function getNextVisibleActions(rec) {
    const hasBreakStart = hasValue(rec.breakStart);
    const hasBreakEnd = hasValue(rec.breakEnd);
    const hasShortStart = hasValue(rec.shortBreakStart);
    const hasShortEnd = hasValue(rec.shortBreakEnd);

    // First scan of the day: show all 4 break buttons.
    if (!hasBreakStart && !hasBreakEnd && !hasShortStart && !hasShortEnd) {
      return ["breakStart", "shortBreakStart", "breakEnd", "shortBreakEnd"];
    }

    // Main break already started: next scan must only allow Break End.
    if (hasBreakStart && !hasBreakEnd) {
      return ["breakEnd"];
    }

    // Short break already started: next scan must only allow Short Break End.
    if (hasShortStart && !hasShortEnd) {
      return ["shortBreakEnd"];
    }

    // Main break completed: next scan only shows short break options.
    if ((hasBreakStart && hasBreakEnd) && !hasShortStart && !hasShortEnd) {
      return ["shortBreakStart", "shortBreakEnd"];
    }

    // If data was saved with Break End only, continue to short break options.
    if (!hasBreakStart && hasBreakEnd && !hasShortStart && !hasShortEnd) {
      return ["shortBreakStart", "shortBreakEnd"];
    }

    // If everything is already completed, no more break action is needed.
    if ((hasBreakStart && hasBreakEnd) && (hasShortStart && hasShortEnd)) {
      return [];
    }

    // Safe fallback.
    return ["breakStart", "shortBreakStart", "breakEnd", "shortBreakEnd"];
  }

  function actionInstruction(rec, visibleKeys) {
    if (!visibleKeys.length) return "Break records completed for today.";
    if (visibleKeys.length === 1 && visibleKeys[0] === "breakEnd") return "Break Start recorded. Only Break End is available.";
    if (visibleKeys.length === 1 && visibleKeys[0] === "shortBreakEnd") return "Short Break Start recorded. Only Short Break End is available.";
    if (visibleKeys.includes("shortBreakStart") && visibleKeys.includes("shortBreakEnd") && !visibleKeys.includes("breakStart")) return "Main break completed. Short break options are available.";
    return "Select the correct break action.";
  }

  function showEmp(emp) {
    currentEmp = emp;
    document.getElementById("eName").textContent = emp.name;
    document.getElementById("eMeta").textContent =
      emp.code + " · " + (emp.department||"") + " · " + (emp.position||"");

    const rec = todayRecords[String(emp.code).toUpperCase()] || {};
    const departedTime = String(rec.departure || "").trim();
    const alreadyDeparted = isDepartureRecorded(rec);
    const visibleKeys = alreadyDeparted ? [] : getNextVisibleActions(rec);
    setVisibleActions(visibleKeys);

    document.querySelectorAll(".abtn").forEach(function(btn) {
      const actionKey = btn.dataset.a;
      btn.dataset.doneTime = rec[actionKey] || "";
      btn.classList.remove("locked");

      if (alreadyDeparted) {
        btn.disabled = true;
        btn.classList.add("locked");
        btn.dataset.doneTime = departedTime || "Departure";
        btn.title = "Departure already recorded" + (departedTime ? " at " + departedTime : "") + ". Attendance is completed for today.";
        return;
      }

      if (!visibleKeys.includes(actionKey)) {
        btn.disabled = true;
        return;
      }

      btn.disabled = false;
      btn.title = "";
    });

    const note = document.querySelector(".note");
    if (note) note.textContent = alreadyDeparted
      ? "Attendance completed for today."
      : actionInstruction(rec, visibleKeys);

    show("actCard",true);

    if (alreadyDeparted) {
      toast("⚠️ " + emp.name + " already departed" + (departedTime ? " at " + departedTime : "") + ". Attendance completed for today.", "warn");
    } else if (!visibleKeys.length) {
      toast("✓ " + emp.name + " break records completed for today.", "ok");
    } else {
      hideToast();
    }
  }
  function hideEmp() { currentEmp=null; show("actCard",false); }

  // ── Action buttons ────────────────────────────────────────────────────────
  const labels = {
    arrival:"Arrived",
    breakStart:"Break Start",
    shortBreakStart:"Short Break Start",
    breakEnd:"Break End",
    shortBreakEnd:"Short Break End",
    departure:"Departure"
  };
  const warnMsgs = {
    arrival:         "⚠️ Arrived already recorded",
    breakStart:      "⚠️ Break Start already recorded",
    shortBreakStart: "⚠️ Short Break Start already recorded",
    breakEnd:        "⚠️ Break End already recorded",
    shortBreakEnd:   "⚠️ Short Break End already recorded",
    departure:       "⚠️ Departure already recorded"
  };

  document.querySelectorAll(".abtn").forEach(function(b) {
    b.addEventListener("click", function() {
      if (isSending || b.disabled) return;

      const codeKey = currentEmp ? String(currentEmp.code).toUpperCase() : "";
      const rec = todayRecords[codeKey] || {};
      if (isDepartureRecorded(rec)) {
        lockDepartedEmployee(currentEmp, rec.departure || "");
        return;
      }

      if (b.dataset.doneTime) {
        toast(warnMsgs[b.dataset.a] + " at " + b.dataset.doneTime, "warn");
        return;
      }
      doAction(b.dataset.a);
    });
  });

  function lockDepartedEmployee(emp, departedTime) {
    setVisibleActions([]);
    document.querySelectorAll(".abtn").forEach(function(btn) {
      btn.disabled = true;
      btn.classList.add("locked");
      btn.dataset.doneTime = departedTime || "Departure";
      btn.title = "Departure already recorded" + (departedTime ? " at " + departedTime : "") + ". Attendance is completed for today.";
    });
    if (emp) {
      toast("⚠️ " + emp.name + " already departed" + (departedTime ? " at " + departedTime : "") + ". Attendance completed for today.", "warn");
    }
  }

  async function doAction(key) {
    if (!currentEmp || isSending) return;
    isSending = true;
    const emp = currentEmp;
    const now = new Date(), date=fmt(now), time=fmtT(now), ts=now.toISOString();

    const codeKey = String(emp.code).toUpperCase();
    if (!todayRecords[codeKey]) todayRecords[codeKey] = {};
    todayRecords[codeKey][key] = time;
    const btn = document.querySelector(".abtn[data-a='" + key + "']");
    if (btn) btn.dataset.doneTime = time;

    const updatedVisibleKeys = getNextVisibleActions(todayRecords[codeKey]);
    setVisibleActions(updatedVisibleKeys);
    const note = document.querySelector(".note");
    if (note) note.textContent = actionInstruction(todayRecords[codeKey], updatedVisibleKeys);

    const payload = {
      type:"attendance", date, timestamp:ts,
      employeeCode:emp.code, employeeName:emp.name,
      department:emp.department||"", position:emp.position||"",
      lastAction:labels[key], source:"qr-kiosk"
    };
    if (key==="arrival")         payload.arrival         = time;
    if (key==="breakStart")      payload.breakStart      = time;
    if (key==="shortBreakStart") payload.shortBreakStart = time;
    if (key==="breakEnd")        payload.breakEnd        = time;
    if (key==="shortBreakEnd")   payload.shortBreakEnd   = time;
    if (key==="departure")       payload.departure       = time;

    toast("✅ " + emp.name + " — " + labels[key] + " at " + time, "ok");

    // Send to Google Sheet in the background so the kiosk clears immediately for the next person.
    sendToSheet(payload)
      .then(function(){ return loadEmps(true); })
      .catch(function(){});

    if (key === "departure") {
      lockDepartedEmployee(emp, time);
    }

    setTimeout(function() {
      isSending = false;
      document.getElementById("empIn").value = "";
      hideEmp();
      hideToast();
      document.getElementById("empIn").focus();
    }, QUICK_RESET_MS);
  }

  async function sendToSheet(payload) {
    try {
      await fetch(SCRIPT_URL, {
        method:"POST", mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify(payload)
      });
    } catch(e) {
      try { new Image().src = SCRIPT_URL + "?data=" + encodeURIComponent(JSON.stringify(payload)); } catch(_){}
    }
  }

  // ── QR Scanner ────────────────────────────────────────────────────────────
  document.getElementById("scanBtn").addEventListener("click", startScan);
  document.getElementById("closeBtn").addEventListener("click", stopScan);

  let qrLibPromise = null;

  function ensureQrLibrary() {
    if (window.Html5Qrcode) return Promise.resolve();
    if (qrLibPromise) return qrLibPromise;

    qrLibPromise = new Promise(function(resolve, reject) {
      const s = document.createElement("script");
      s.src = "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
      s.async = true;
      s.onload = resolve;
      s.onerror = function() { reject(new Error("QR scanner library failed to load.")); };
      document.head.appendChild(s);
    });
    return qrLibPromise;
  }

  async function startScan() {
    show("reader",true); show("closeBtn",true); show("scanBtn",false);
    try {
      await ensureQrLibrary();
    } catch(e) {
      toast(e.message, "err");
      stopScan();
      return;
    }

    scanner = new Html5Qrcode("reader");
    scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:220,height:220}},
      function(txt) {
        let code = txt.trim().toUpperCase();
        try { const u=new URL(txt); const p=u.searchParams.get("employee"); if(p) code=p.toUpperCase(); } catch(_){}
        document.getElementById("empIn").value = code;
        document.getElementById("empIn").dispatchEvent(new Event("input"));
        stopScan();
      }, function(){}
    ).catch(function(e){ toast("Camera error: "+e,"err"); stopScan(); });
  }

  function stopScan() {
    if (scanner) scanner.stop().catch(function(){}).finally(function(){
      scanner=null;
      show("reader",false); show("closeBtn",false); show("scanBtn",true);
      document.getElementById("reader").innerHTML="";
    });
  }

  function show(id,v){ document.getElementById(id).classList.toggle("hidden",!v); }
  function toast(msg,type){ const e=document.getElementById("toast"); e.textContent=msg; e.className="toast show "+(type||""); }
  function hideToast(){ document.getElementById("toast").classList.remove("show"); }
</script>
</body>
</html>
